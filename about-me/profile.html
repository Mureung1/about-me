<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조정민 - 프로필</title>
    <style>
        /* 기본 초기화 및 폰트 설정 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        /* 프로필 카드 스타일 */
        .profile-card {
            background-color: #ffffff;
            width: 320px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* 프로필 이미지(이니셜) 스타일 */
        .profile-avatar {
            width: 100px;
            height: 100px;
            background-color: #eef2ff;
            color: #4f46e5;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: 800;
            margin: 0 auto 20px auto;
        }

        /* 텍스트 스타일 */
        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #111827;
        }
        .profile-univ {
            font-size: 16px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 4px;
        }
        .profile-dept {
            font-size: 15px;
            color: #6b7280;
        }

        /* 하단 장식용 태그 */
        .tag {
            display: inline-block;
            margin-top: 24px;
            padding: 6px 16px;
            background-color: #f3f4f6;
            color: #374151;
            font-size: 13px;
            font-weight: 600;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="profile-avatar">조</div>
        
        <h1 class="profile-name">조정민</h1>
        <p class="profile-univ">전남대학교</p>
        <p class="profile-dept">전자컴퓨터공학부</p>
        
        <div class="tag">Engineering Student</div>
    </div>

</body>
</html>
